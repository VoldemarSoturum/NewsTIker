<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Новости</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }
    .ticker-wrap {
      width: 100%;
      overflow: hidden;
      background: #222;
      height: 40px;
      line-height: 40px;
      position: relative;
    }
    .ticker {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      animation: scroll 93s linear infinite;
    }
    .ticker a {
      color: #00ffcc;
      text-decoration: none;
      margin: 0 40px;
    }
    .ticker-outer {
      display: flex;
    }
    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <div class="ticker-outer">
      <div class="ticker" id="ticker1">Загрузка новостей...</div>
      <div class="ticker" id="ticker2"></div>
    </div>
  </div>

  <script>
    function loadNews() {
      const RSS_URL = "https://ria.ru/export/rss2/archive/index.xml";
      // Используем RSS2JSON — он возвращает готовый JSON
      const url = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(RSS_URL);

      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error("HTTP " + response.status);
          return response.json();
        })
        .then(data => {
          if (data.status !== "ok") throw new Error(data.message || "Неизвестная ошибка");
          const items = data.items.slice(0, 30); // массив объектов

          const ticker1 = document.getElementById("ticker1");
          const ticker2 = document.getElementById("ticker2");
          ticker1.innerHTML = "";
          ticker2.innerHTML = "";

          items.forEach(item => {
            const a1 = document.createElement("a");
            a1.href = item.link;
            a1.target = "_blank";
            a1.textContent = item.title;
            ticker1.appendChild(a1);
            const a2 = a1.cloneNode(true);
            ticker2.appendChild(a2);
          });
        })
        .catch(err => {
          console.error("Ошибка загрузки новостей:", err);
          document.getElementById("ticker1").textContent = "Не удалось загрузить новости.";
        });
    }

    loadNews();
    setInterval(loadNews, 5 * 60 * 1000);
  </script>
</body>
</html>
